<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearPlex Tint Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ClearPlex Tint Simulator</h1>
     <div class="vehicle-selector">

    <button onclick="changeVehicle('suv')">
        🚙 SUV
    </button>

    <button onclick="changeVehicle('sedan')">
        🚗 Sedan
    </button>

</div>
    <p class="subtitle">
        Машин дээр хальсны бууралтыг урьдчилан харах
    </p>

    <img id="carImage" src="suv_90.jpg" alt="SUV Tint">

    <h2 id="tintValue">90%</h2>
    <div id="badge"></div>
    <div class="buttons">

        <button onclick="changeTint('90')">90%</button>
        <button onclick="changeTint('80')">80%</button>
        <button onclick="changeTint('70')">70%</button>
        <button onclick="changeTint('60')">60%</button>
        <button onclick="changeTint('50')">50%</button>
        <button onclick="changeTint('40')">40%</button>

        <button onclick="changeTint('35')">35%</button>
        <button onclick="changeTint('30')">30%</button>
        <button onclick="changeTint('20')">20%</button>
        <button onclick="changeTint('15')">15%</button>
        <button onclick="changeTint('10')">10%</button>
        <button onclick="changeTint('05')">5%</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
